services:

  db:
    image: postgres:15
    container_name: receptionist_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receptionist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: receptionist_api
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

    command: >
      bash -c "
      until pg_isready -h db -p 5432 -U postgres;
      do
        echo 'Waiting for postgres...';
        sleep 2;
      done;
      alembic upgrade head &&
      uvicorn app:app --host 0.0.0.0 --port 8000
      "

    ports:
      - "8000:8000"

volumes:
  postgres_data: